<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My India Passport — A Grade 3 Quiz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#FBF3E3;
    --saffron:#EF7F2B;
    --saffron-deep:#D9631A;
    --green:#1E6B4F;
    --green-deep:#134C38;
    --navy:#1B2A4A;
    --gold:#C9971F;
    --card:#FFFFFF;
    --line:#E7DCC4;
    --wrong:#C0392B;
    --shadow: 0 10px 30px rgba(27,42,74,0.10);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(circle at 10% 8%, rgba(239,127,43,0.10), transparent 40%),
      radial-gradient(circle at 92% 18%, rgba(30,107,79,0.10), transparent 42%),
      var(--cream);
    font-family:'Nunito', sans-serif;
    color:var(--navy);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3, .display{ font-family:'Baloo 2', cursive; }
  @media (prefers-reduced-motion: reduce){ *{animation:none !important; transition:none !important;} }

  .app{ max-width:760px; margin:0 auto; padding:22px 18px 60px; }
  .passport-header{ display:flex; align-items:center; justify-content:space-between; gap:14px; margin-bottom:18px; }
  .passport-title{ display:flex; align-items:center; gap:12px; }
  .passport-title .emblem{ font-size:34px; line-height:1; }
  .passport-title h1{ font-size:22px; margin:0; color:var(--navy); letter-spacing:0.2px; }
  .passport-title p{ margin:2px 0 0; font-size:12.5px; color:#6b6456; font-weight:700; letter-spacing:0.4px; text-transform:uppercase; }

  .stamp-rail{ display:flex; gap:8px; }
  .stamp{ width:34px;height:34px; border-radius:50%; border:2.5px dashed #cbbf9d; display:flex;align-items:center;justify-content:center; font-size:16px; background:#fff; color:#cbbf9d; transition:transform .35s ease, background .35s ease, border-color .35s ease, color .35s ease; }
  .stamp.done{ border-style:solid; border-color:var(--green); color:var(--green); background:#EAF5EF; transform:rotate(-8deg) scale(1.05); }

  .panel{ background:var(--card); border-radius:22px; box-shadow:var(--shadow); border:1px solid var(--line); padding:30px 26px; position:relative; overflow:hidden; }
  .panel::before{ content:""; position:absolute; top:0;left:0;right:0; height:6px; background:repeating-linear-gradient(90deg, var(--saffron) 0 18px, var(--green) 18px 36px); opacity:0.9; }

  .start-screen{ text-align:center; padding-top:20px; }
  .start-screen .big-emblem{ font-size:64px; margin-bottom:6px; }
  .start-screen h2{ font-size:28px; margin:6px 0 10px; }
  .start-screen p.sub{ color:#5c5646; font-size:15.5px; max-width:480px; margin:0 auto 22px; line-height:1.5; }

  .topic-grid{ display:grid; grid-template-columns:repeat(auto-fit, minmax(140px,1fr)); gap:12px; margin:18px 0 26px; }
  .topic-chip{ background:#FFF7EC; border:1px solid #F0DFC0; border-radius:14px; padding:14px 10px; font-weight:700; font-size:13px; color:var(--saffron-deep); }
  .topic-chip .ti{ font-size:22px; display:block; margin-bottom:6px;}
  .topic-chip .tn{ display:block; }
  .topic-chip .tc{ display:block; font-weight:600; color:#8a8270; font-size:11px; margin-top:3px; text-transform:none; }

  .timer-picker{ margin:6px 0 26px; }
  .timer-picker .tp-label{ font-size:12.5px; font-weight:800; color:#8a8270; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:10px; }
  .timer-options{ display:flex; gap:9px; justify-content:center; flex-wrap:wrap; }
  .timer-opt{ background:#fff; border:2px solid var(--line); border-radius:12px; padding:10px 16px; font-family:'Baloo 2',cursive; font-weight:700; font-size:15px; color:var(--navy); cursor:pointer; transition:all .15s ease; }
  .timer-opt:hover{ border-color:var(--saffron); }
  .timer-opt.selected{ border-color:var(--saffron); background:#FFF1DD; color:var(--saffron-deep); }
  .timer-opt:focus-visible{ outline:3px solid var(--navy); outline-offset:2px; }

  button.primary-btn{ background:var(--saffron); color:#fff; border:none; font-family:'Baloo 2',cursive; font-size:19px; font-weight:700; padding:14px 34px; border-radius:50px; cursor:pointer; box-shadow:0 8px 18px rgba(239,127,43,0.35); transition:transform .15s ease, box-shadow .15s ease, background .15s ease; }
  button.primary-btn:hover{ transform:translateY(-2px); box-shadow:0 12px 22px rgba(239,127,43,0.4); background:var(--saffron-deep);}
  button.primary-btn:active{ transform:translateY(0px); }
  button.primary-btn:focus-visible{ outline:3px solid var(--navy); outline-offset:3px; }

  /* ---------- quiz screen ---------- */
  .quiz-meta{ display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; font-weight:800; font-size:12.5px; letter-spacing:0.5px; text-transform:uppercase; }
  .quiz-meta .topic-tag{ color:var(--green-deep); background:#EAF5EF; border:1px solid #cfe8db; padding:5px 12px; border-radius:20px; }
  .quiz-meta .qcount{ color:#8a8270; }

  .progress-track{ height:8px; border-radius:6px; background:#F0E7D2; overflow:hidden; margin-bottom:16px; }
  .progress-fill{ height:100%; background:linear-gradient(90deg, var(--saffron), var(--gold)); border-radius:6px; transition:width .4s ease; }

  /* countdown timer */
  .timer-row{ display:flex; align-items:center; gap:10px; margin-bottom:18px; }
  .timer-ring-wrap{ position:relative; width:44px; height:44px; flex:0 0 44px; }
  .timer-ring-wrap svg{ transform:rotate(-90deg); }
  .timer-ring-bg{ fill:none; stroke:#F0E7D2; stroke-width:5; }
  .timer-ring-fg{ fill:none; stroke:var(--saffron); stroke-width:5; stroke-linecap:round; transition:stroke-dashoffset 1s linear, stroke .3s ease; }
  .timer-ring-num{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-family:'Baloo 2',cursive; font-weight:700; font-size:14px; color:var(--navy); }
  .timer-label{ font-size:12.5px; font-weight:700; color:#8a8270; }
  .timer-row.urgent .timer-ring-fg{ stroke:var(--wrong); }
  .timer-row.urgent .timer-ring-num{ color:var(--wrong); }

  .qtype-badge{ display:inline-block; font-size:11.5px; font-weight:800; letter-spacing:0.4px; text-transform:uppercase; color:var(--saffron-deep); background:#FFF1DD; border:1px solid #F3D9AC; padding:4px 10px; border-radius:8px; margin-bottom:12px; }

  .question-text{ font-size:20px; font-weight:700; line-height:1.4; margin:0 0 6px; color:var(--navy); }
  .question-hint{ font-size:13.5px; color:#8a8270; margin-bottom:18px; font-weight:600; }

  .picture-stage{ display:flex; align-items:center; justify-content:center; font-size:74px; background:#FBF6EA; border:1px dashed #E4D5AE; border-radius:18px; padding:22px 10px; margin-bottom:20px; line-height:1; }

  .options{ display:grid; gap:12px; margin-bottom:8px; }
  .option{ text-align:left; background:#fff; border:2px solid var(--line); border-radius:14px; padding:14px 16px; font-size:16px; font-weight:700; font-family:'Nunito',sans-serif; color:var(--navy); cursor:pointer; display:flex; align-items:center; gap:12px; transition:border-color .15s ease, background .15s ease, transform .1s ease; }
  .option .letter{ width:28px;height:28px; flex:0 0 28px; border-radius:50%; background:#F3EEDF; display:flex;align-items:center;justify-content:center; font-size:13px; font-weight:800; color:#8a8270; }
  .option:hover:not(.locked){ border-color:var(--saffron); background:#FFF9F0; }
  .option:focus-visible{ outline:3px solid var(--navy); outline-offset:2px; }
  .option.correct{ border-color:var(--green); background:#EAF5EF; }
  .option.correct .letter{ background:var(--green); color:#fff; }
  .option.wrong{ border-color:var(--wrong); background:#FBEAE8; }
  .option.wrong .letter{ background:var(--wrong); color:#fff; }
  .option.locked{ cursor:default; }
  .option.dim{ opacity:0.55; }

  .feedback{ margin-top:16px; padding:14px 16px; border-radius:14px; font-weight:700; font-size:14.5px; display:none; align-items:flex-start; gap:10px; line-height:1.5; }
  .feedback.show{ display:flex; }
  .feedback.good{ background:#EAF5EF; color:var(--green-deep); border:1px solid #cfe8db; }
  .feedback.bad{ background:#FBEAE8; color:#8a251b; border:1px solid #f2c9c4; }
  .feedback .fi{ font-size:20px; }

  /* learn more */
  .learnmore-wrap{ margin-top:14px; display:none; }
  .learnmore-wrap.show{ display:block; }
  .learn-toggle{ background:transparent; border:2px solid var(--gold); color:var(--gold); font-family:'Baloo 2',cursive; font-weight:700; font-size:14px; padding:8px 16px; border-radius:50px; cursor:pointer; display:inline-flex; align-items:center; gap:6px; }
  .learn-toggle:hover{ background:#FBF3DC; }
  .learn-toggle:focus-visible{ outline:3px solid var(--navy); outline-offset:2px; }
  .learn-panel{ display:none; margin-top:12px; background:#FBF8F0; border:1px solid #EFE3C6; border-radius:14px; padding:16px 18px; }
  .learn-panel.open{ display:block; }
  .learn-panel p{ margin:0 0 12px; font-size:14px; line-height:1.65; color:#4a4536; font-weight:600; }
  .ref-links{ display:flex; gap:8px; flex-wrap:wrap; }
  .ref-links a{ font-size:12.5px; font-weight:800; color:var(--green-deep); background:#EAF5EF; border:1px solid #cfe8db; padding:6px 12px; border-radius:20px; text-decoration:none; }
  .ref-links a:hover{ background:#dcefe5; }
  .ref-links a:focus-visible{ outline:3px solid var(--navy); outline-offset:2px; }

  .nav-row{ display:flex; justify-content:flex-end; margin-top:20px; }

  /* ---------- results screen ---------- */
  .results-screen{ text-align:center; }
  .medal{ font-size:60px; margin-bottom:8px; }
  .score-big{ font-size:46px; font-weight:800; color:var(--saffron-deep); margin:6px 0 2px; }
  .score-sub{ color:#6b6456; font-weight:700; margin-bottom:20px; }
  .rank-line{ display:inline-block; background:#FFF1DD; border:1px solid #F3D9AC; color:var(--saffron-deep); font-family:'Baloo 2',cursive; font-size:18px; padding:8px 20px; border-radius:50px; margin-bottom:24px; }
  .topic-breakdown{ display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:10px; text-align:left; margin-bottom:26px; }
  .tb-card{ background:#FBF6EA; border:1px solid var(--line); border-radius:14px; padding:12px 14px; }
  .tb-card .tb-name{ font-size:12px; font-weight:800; color:#8a8270; text-transform:uppercase; letter-spacing:0.3px;}
  .tb-card .tb-score{ font-size:20px; font-weight:800; color:var(--navy); margin-top:2px; }
  .tb-card .tb-timedout{ font-size:11px; color:#a49c88; font-weight:700; margin-top:2px; }

  .btn-row{ display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }

  .foot-note{ text-align:center; margin-top:22px; font-size:12.5px; color:#a49c88; font-weight:700; }

  @media (max-width:480px){
    .panel{ padding:22px 16px; }
    .question-text{ font-size:18px; }
    .picture-stage{ font-size:58px; padding:18px 8px; }
    .passport-title h1{ font-size:18px; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="passport-header">
    <div class="passport-title">
      <div class="emblem">🛂</div>
      <div>
        <h1>My India Passport</h1>
        <p>A Class 3 General Knowledge Quiz</p>
      </div>
    </div>
    <div class="stamp-rail" id="stampRail" aria-hidden="true"></div>
  </div>

  <div class="panel" id="panel"></div>

  <p class="foot-note" id="footNote">🇮🇳 5 topics · 100 questions · Good luck, explorer!</p>
</div>

<script>
/* =====================================================
   DATA — 5 topics × 4 question types, 20 each (100 total)
   Each question carries a "learn" object with a short
   background passage (<=200 words) and up to 2 references.
===================================================== */
const TOPICS = [
  { key:"states", name:"States, UTs & Capitals", icon:"🗺️" },
  { key:"monuments", name:"Famous Monuments", icon:"🕌" },
  { key:"symbols", name:"National Symbols", icon:"🦚" },
  { key:"festivals", name:"National Festivals", icon:"🎉" },
  { key:"leaders", name:"Leaders & Basics", icon:"🏛️" },
];

const TYPE_LABEL = {
  mcq: "Multiple Choice",
  oddOneOut: "Odd One Out",
  identify: "Identify & Name",
  picture: "Picture Question",
};

// ---- shared reference bundles, reused across related questions ----
const REF = {
  statesList: [{label:"Wikipedia: States & UTs of India", url:"https://en.wikipedia.org/wiki/States_and_union_territories_of_India"}],
  flag: [{label:"Wikipedia: Flag of India", url:"https://en.wikipedia.org/wiki/Flag_of_India"}],
  ashokaChakra: [{label:"Wikipedia: Ashoka Chakra", url:"https://en.wikipedia.org/wiki/Ashoka_Chakra"}],
  independence: [{label:"Wikipedia: Independence Day (India)", url:"https://en.wikipedia.org/wiki/Independence_Day_(India)"}],
  republicDay: [{label:"Wikipedia: Republic Day (India)", url:"https://en.wikipedia.org/wiki/Republic_Day_(India)"}],
  gandhiJayanti: [{label:"Wikipedia: Gandhi Jayanti", url:"https://en.wikipedia.org/wiki/Gandhi_Jayanti"}],
  gandhi: [{label:"Wikipedia: Mahatma Gandhi", url:"https://en.wikipedia.org/wiki/Mahatma_Gandhi"}],
  bose: [{label:"Wikipedia: Subhas Chandra Bose", url:"https://en.wikipedia.org/wiki/Subhas_Chandra_Bose"}],
  kalam: [{label:"Wikipedia: A. P. J. Abdul Kalam", url:"https://en.wikipedia.org/wiki/A._P._J._Abdul_Kalam"}],
};

const QUESTIONS = [
// ============================================================
// 1. STATES, UNION TERRITORIES & CAPITALS  (20)
// ============================================================
{ topic:"states", type:"mcq", q:"What is the capital of Karnataka?", options:["Chennai","Bengaluru","Hyderabad","Mumbai"], answer:1, explain:"Bengaluru is the capital of Karnataka.",
  learn:{ text:"Bengaluru was once called Bangalore and was officially renamed in 2014 to match its Kannada pronunciation. It grew from a garden city with a pleasant climate into India's biggest hub for software and technology companies, earning the nickname 'Silicon Valley of India.'",
  links:[{label:"Wikipedia: Bangalore", url:"https://en.wikipedia.org/wiki/Bangalore"}] } },
{ topic:"states", type:"mcq", q:"Which city is the capital of India?", options:["Mumbai","Kolkata","New Delhi","Jaipur"], answer:2, explain:"New Delhi is the capital of our country.",
  learn:{ text:"New Delhi was built by the British in the early 1900s to be the new seat of government, replacing Kolkata as the capital in 1911. It was officially inaugurated in 1931 and today houses Parliament, the President's residence (Rashtrapati Bhavan), and most central government offices.",
  links:[{label:"Wikipedia: New Delhi", url:"https://en.wikipedia.org/wiki/New_Delhi"}] } },
{ topic:"states", type:"mcq", q:"What is the capital of Maharashtra?", options:["Pune","Nagpur","Mumbai","Nashik"], answer:2, explain:"Mumbai is the capital of Maharashtra.",
  learn:{ text:"Mumbai, formerly called Bombay until it was renamed in 1995, grew from seven small islands joined together over centuries. It's India's financial capital, home to the Bombay Stock Exchange, the Reserve Bank of India, and the Hindi film industry, Bollywood.",
  links:[{label:"Wikipedia: Mumbai", url:"https://en.wikipedia.org/wiki/Mumbai"}] } },
{ topic:"states", type:"mcq", q:"What is the capital of Tamil Nadu?", options:["Madurai","Coimbatore","Chennai","Salem"], answer:2, explain:"Chennai is the capital of Tamil Nadu.",
  learn:{ text:"Chennai was founded as Madras in 1639 when the British East India Company built Fort St. George on the coast. It was renamed Chennai in 1996 and is known today for Marina Beach, classical Bharatanatyam dance, and a strong automobile and IT industry.",
  links:[{label:"Wikipedia: Chennai", url:"https://en.wikipedia.org/wiki/Chennai"}] } },
{ topic:"states", type:"mcq", q:"What is the capital of West Bengal?", options:["Kolkata","Darjeeling","Asansol","Howrah"], answer:0, explain:"Kolkata is the capital of West Bengal.",
  learn:{ text:"Kolkata (once Calcutta) served as the capital of British India until 1911, when the British moved the capital to Delhi. It remains a major centre for literature, art, and politics, and is famous for its trams, the Howrah Bridge, and Durga Puja celebrations.",
  links:[{label:"Wikipedia: Kolkata", url:"https://en.wikipedia.org/wiki/Kolkata"}] } },
{ topic:"states", type:"mcq", q:"What is the capital of Rajasthan?", options:["Udaipur","Jodhpur","Jaipur","Kota"], answer:2, explain:"Jaipur, the Pink City, is the capital of Rajasthan.",
  learn:{ text:"Jaipur was carefully planned and built in 1727 by Maharaja Sawai Jai Singh II, making it one of India's earliest planned cities. Its buildings were painted pink in 1876 to welcome the Prince of Wales, earning it the nickname 'Pink City.'",
  links:[{label:"Wikipedia: Jaipur", url:"https://en.wikipedia.org/wiki/Jaipur"}] } },
{ topic:"states", type:"mcq", q:"What is the capital of Kerala?", options:["Kochi","Thiruvananthapuram","Kozhikode","Alappuzha"], answer:1, explain:"Thiruvananthapuram is the capital of Kerala.",
  learn:{ text:"Thiruvananthapuram, sometimes shortened to Trivandrum, is named after the deity Anantha at the famous Sree Padmanabhaswamy Temple. Built across low hills near the coast, it's often praised as one of India's cleanest and greenest cities.",
  links:[{label:"Wikipedia: Thiruvananthapuram", url:"https://en.wikipedia.org/wiki/Thiruvananthapuram"}] } },
{ topic:"states", type:"mcq", q:"What is the capital of Uttar Pradesh?", options:["Kanpur","Agra","Lucknow","Varanasi"], answer:2, explain:"Lucknow is the capital of Uttar Pradesh.",
  learn:{ text:"Lucknow was ruled by the Nawabs of Awadh, who left behind grand buildings, elegant manners called 'Lucknowi tehzeeb,' and rich Awadhi cuisine like biryani and kebabs. Today it's Uttar Pradesh's capital and a major cultural centre in North India.",
  links:[{label:"Wikipedia: Lucknow", url:"https://en.wikipedia.org/wiki/Lucknow"}] } },
{ topic:"states", type:"mcq", q:"What is the capital of Gujarat?", options:["Ahmedabad","Surat","Vadodara","Gandhinagar"], answer:3, explain:"Gandhinagar is the capital of Gujarat (Ahmedabad is its largest city).",
  learn:{ text:"Gandhinagar was built in the 1960s as a planned capital city and named after Mahatma Gandhi. Even though Ahmedabad is much bigger and better known, Gandhinagar was chosen to be the seat of government and is known for its wide, tree-lined sectors.",
  links:[{label:"Wikipedia: Gandhinagar", url:"https://en.wikipedia.org/wiki/Gandhinagar"}] } },
{ topic:"states", type:"mcq", q:"Which city is the shared capital of Punjab and Haryana?", options:["Amritsar","Chandigarh","Ludhiana","Panchkula"], answer:1, explain:"Chandigarh is a Union Territory that serves as the capital of both Punjab and Haryana.",
  learn:{ text:"Chandigarh was India's first fully planned city after independence, designed by the famous Swiss-French architect Le Corbusier in the 1950s. Because Punjab was divided in 1966 to form Haryana, the two states still share Chandigarh as their capital, but it is governed separately as a Union Territory.",
  links:[{label:"Wikipedia: Chandigarh", url:"https://en.wikipedia.org/wiki/Chandigarh"}] } },
{ topic:"states", type:"mcq", q:"How many states does India currently have?", options:["25","26","28","30"], answer:2, explain:"India currently has 28 states.",
  learn:{ text:"India's state map has changed many times since 1947, mostly to group people who share a common language together. The newest state, Telangana, was carved out of Andhra Pradesh in 2014, bringing the total number of states to 28.",
  links:REF.statesList } },
{ topic:"states", type:"mcq", q:"How many Union Territories does India currently have?", options:["6","7","8","9"], answer:2, explain:"India currently has 8 Union Territories.",
  learn:{ text:"Unlike states, Union Territories are governed directly by the central government, often through an appointed Lieutenant Governor. In 2019, Jammu and Kashmir was reorganised into two Union Territories, Jammu & Kashmir and Ladakh, bringing today's total to 8.",
  links:REF.statesList } },
{ topic:"states", type:"oddOneOut", q:"Which one of these is NOT a Union Territory?", hint:"Three of these are Union Territories, and one is a full state.", options:["Kerala","Chandigarh","Puducherry","Lakshadweep"], answer:0, explain:"Kerala is a state, while Chandigarh, Puducherry and Lakshadweep are Union Territories.",
  learn:{ text:"States have their own elected government with full powers, while Union Territories are usually smaller and administered more directly by the central government. Puducherry (once a French colony) and tiny island group Lakshadweep are both Union Territories, unlike the full state of Kerala.",
  links:REF.statesList } },
{ topic:"states", type:"oddOneOut", q:"Which one of these states is NOT in South India?", hint:"Three of these are southern states.", options:["Assam","Kerala","Karnataka","Tamil Nadu"], answer:0, explain:"Assam is a north-eastern state; the other three are in South India.",
  learn:{ text:"South India traditionally includes Kerala, Karnataka, Tamil Nadu, Andhra Pradesh, and Telangana, all known for Dravidian languages and cultures. Assam, on the other hand, lies in the north-east, in the Brahmaputra river valley, and has its own distinct language and traditions.",
  links:[{label:"Wikipedia: South India", url:"https://en.wikipedia.org/wiki/South_India"}] } },
{ topic:"states", type:"identify", q:"I am a state famous for my tea gardens and the one-horned rhinos of Kaziranga. Which state am I?", options:["Assam","Punjab","Gujarat","Odisha"], answer:0, explain:"Assam is known for its tea gardens and Kaziranga National Park.",
  learn:{ text:"Assam grows a large share of India's tea on rolling plantations along the Brahmaputra valley. Kaziranga National Park, a UNESCO World Heritage Site here, protects more than two-thirds of the world's greater one-horned rhinoceroses.",
  links:[{label:"Wikipedia: Assam", url:"https://en.wikipedia.org/wiki/Assam"}] } },
{ topic:"states", type:"identify", q:"I am called the 'Land of Five Rivers.' Which state am I?", options:["Punjab","Bihar","Haryana","Odisha"], answer:0, explain:"Punjab means 'land of five rivers.'",
  learn:{ text:"The word 'Punjab' comes from Persian words meaning 'five waters,' referring to five rivers that once flowed through the region: the Sutlej, Beas, Ravi, Chenab, and Jhelum. Today, most of these rivers flow through Indian and Pakistani Punjab, which were divided in 1947.",
  links:[{label:"Wikipedia: Punjab, India", url:"https://en.wikipedia.org/wiki/Punjab,_India"}] } },
{ topic:"states", type:"identify", q:"I am a desert state, home to camels and the Thar Desert. Which state am I?", options:["Rajasthan","Madhya Pradesh","Gujarat","Haryana"], answer:0, explain:"Rajasthan is home to the Thar Desert.",
  learn:{ text:"Rajasthan is India's largest state by area and much of its western region is covered by the Thar Desert, also called the Great Indian Desert. Camels have long been used here for travel and farm work, which is why the camel is Rajasthan's official state animal.",
  links:[{label:"Wikipedia: Rajasthan", url:"https://en.wikipedia.org/wiki/Rajasthan"}] } },
{ topic:"states", type:"identify", q:"I am often called the 'Spice Garden of India' because of my pepper and cardamom. Which state am I?", options:["Kerala","Goa","Sikkim","Manipur"], answer:0, explain:"Kerala is known as the Spice Garden of India.",
  learn:{ text:"Kerala's hilly, humid climate is perfect for growing spices like black pepper, cardamom, and cinnamon, which traders from Rome, Arabia, and Europe sailed across oceans to buy for centuries. This spice trade shaped much of Kerala's history and its many cultural influences.",
  links:[{label:"Wikipedia: Kerala", url:"https://en.wikipedia.org/wiki/Kerala"}] } },
{ topic:"states", type:"picture", picture:"🏔️🐆", q:"This picture shows snowy mountains and a cold desert. Which Union Territory is this?", options:["Ladakh","Goa","Delhi","Puducherry"], answer:0, explain:"Ladakh is a Union Territory known for its high mountains and cold desert.",
  learn:{ text:"Ladakh sits high in the Himalayas, so dry and cold that it's often called a 'cold desert' even though it's surrounded by snowy peaks. It became a separate Union Territory in 2019, after being part of the former state of Jammu and Kashmir.",
  links:[{label:"Wikipedia: Ladakh", url:"https://en.wikipedia.org/wiki/Ladakh"}] } },
{ topic:"states", type:"picture", picture:"🏝️🌴", q:"This picture shows tropical islands surrounded by the sea. Which Union Territory is this?", options:["Andaman & Nicobar Islands","Chandigarh","Delhi","Ladakh"], answer:0, explain:"The Andaman & Nicobar Islands are a group of tropical islands in the Bay of Bengal.",
  learn:{ text:"This Union Territory is made up of over 500 islands scattered across the Bay of Bengal, though only a small number are inhabited. It's known for coral reefs, dense rainforests, and the Cellular Jail in Port Blair, where freedom fighters were once imprisoned by the British.",
  links:[{label:"Wikipedia: Andaman and Nicobar Islands", url:"https://en.wikipedia.org/wiki/Andaman_and_Nicobar_Islands"}] } },

// ============================================================
// 2. FAMOUS MONUMENTS OF INDIA  (20)
// ============================================================
{ topic:"monuments", type:"mcq", q:"The Taj Mahal is located in which city?", options:["Agra","Delhi","Jaipur","Lucknow"], answer:0, explain:"The Taj Mahal stands on the banks of the Yamuna river in Agra.",
  learn:{ text:"The Taj Mahal was built between 1632 and 1653 by Mughal emperor Shah Jahan as a tomb for his beloved wife, Mumtaz Mahal, who died during childbirth. Made of white marble that seems to change colour with the light, it's one of the New Seven Wonders of the World and a UNESCO World Heritage Site.",
  links:[{label:"Wikipedia: Taj Mahal", url:"https://en.wikipedia.org/wiki/Taj_Mahal"}] } },
{ topic:"monuments", type:"mcq", q:"The Gateway of India is located in which city?", options:["Mumbai","Chennai","Kolkata","Surat"], answer:0, explain:"The Gateway of India overlooks the Arabian Sea in Mumbai.",
  learn:{ text:"This grand arch was built in 1924 to commemorate the 1911 visit of King George V and Queen Mary to India, and it once served as a ceremonial entrance for important visitors arriving by sea. Ironically, the last British troops leaving India in 1948 also passed through it on their way home.",
  links:[{label:"Wikipedia: Gateway of India", url:"https://en.wikipedia.org/wiki/Gateway_of_India"}] } },
{ topic:"monuments", type:"mcq", q:"The Red Fort is located in which city?", options:["Agra","Delhi","Jaipur","Amritsar"], answer:1, explain:"The Red Fort is a Mughal fort in Delhi.",
  learn:{ text:"Built by Shah Jahan between 1638 and 1648 out of red sandstone, this fort was the main residence of Mughal emperors for nearly 200 years. Today, it's most famous as the place where India's Prime Minister raises the national flag and addresses the nation every Independence Day.",
  links:[{label:"Wikipedia: Red Fort", url:"https://en.wikipedia.org/wiki/Red_Fort"}] } },
{ topic:"monuments", type:"mcq", q:"Charminar is located in which city?", options:["Hyderabad","Bengaluru","Chennai","Mysuru"], answer:0, explain:"Charminar is a famous monument in Hyderabad.",
  learn:{ text:"Charminar, meaning 'four minarets' in Urdu, was built in 1591 by Sultan Muhammad Quli Qutb Shah, reportedly to mark the end of a deadly plague in the city. It stands at the heart of Hyderabad's old city, surrounded by busy markets selling pearls, bangles, and spices.",
  links:[{label:"Wikipedia: Charminar", url:"https://en.wikipedia.org/wiki/Charminar"}] } },
{ topic:"monuments", type:"mcq", q:"The Konark Sun Temple is located in which state?", options:["Odisha","Bihar","West Bengal","Jharkhand"], answer:0, explain:"The Konark Sun Temple, shaped like a giant chariot, is in Odisha.",
  learn:{ text:"Built in the 13th century, this temple was designed to look like a massive stone chariot for the sun god Surya, complete with 24 intricately carved wheels and seven horses. It's a UNESCO World Heritage Site and one of India's most remarkable examples of temple architecture.",
  links:[{label:"Wikipedia: Konark Sun Temple", url:"https://en.wikipedia.org/wiki/Konark_Sun_Temple"}] } },
{ topic:"monuments", type:"mcq", q:"Hawa Mahal, the 'Palace of Winds,' is located in which city?", options:["Jaipur","Udaipur","Jodhpur","Bikaner"], answer:0, explain:"Hawa Mahal is a famous pink palace in Jaipur.",
  learn:{ text:"Hawa Mahal was built in 1799 by Maharaja Sawai Pratap Singh so that royal women could watch street festivals and daily life below without being seen themselves, following the custom of purdah. Its honeycomb facade has 953 small windows, which also let cool breeze flow through, giving the palace its name.",
  links:[{label:"Wikipedia: Hawa Mahal", url:"https://en.wikipedia.org/wiki/Hawa_Mahal"}] } },
{ topic:"monuments", type:"mcq", q:"The Ajanta and Ellora Caves are located in which state?", options:["Maharashtra","Gujarat","Madhya Pradesh","Karnataka"], answer:0, explain:"The Ajanta and Ellora Caves, famous for their rock-cut art, are in Maharashtra.",
  learn:{ text:"These ancient caves were carved directly into rock cliffs starting around the 2nd century BCE, and are famous for detailed Buddhist paintings and sculptures. Forgotten for centuries, the Ajanta Caves were rediscovered by a British officer in 1819 while he was out hunting tigers.",
  links:[{label:"Wikipedia: Ajanta Caves", url:"https://en.wikipedia.org/wiki/Ajanta_Caves"}] } },
{ topic:"monuments", type:"mcq", q:"India Gate is located in which city?", options:["New Delhi","Mumbai","Kolkata","Chennai"], answer:0, explain:"India Gate is a war memorial in New Delhi.",
  learn:{ text:"India Gate was built in 1931 as a memorial to around 84,000 soldiers of the British Indian Army who died in World War I and the Third Anglo-Afghan War. Their names are engraved on the monument, and an eternal flame once burned beneath it in honour of unknown soldiers.",
  links:[{label:"Wikipedia: India Gate", url:"https://en.wikipedia.org/wiki/India_Gate"}] } },
{ topic:"monuments", type:"mcq", q:"The Golden Temple, a holy Sikh shrine, is located in which city?", options:["Amritsar","Ludhiana","Chandigarh","Patiala"], answer:0, explain:"The Golden Temple is located in Amritsar, Punjab.",
  learn:{ text:"Known formally as Harmandir Sahib, the Golden Temple was built by Guru Arjan, the fifth Sikh Guru, and completed around 1604. Its upper floors are covered in real gold, and it welcomes people of every faith, serving free meals to over 100,000 visitors a day through its community kitchen.",
  links:[{label:"Wikipedia: Golden Temple", url:"https://en.wikipedia.org/wiki/Golden_Temple"}] } },
{ topic:"monuments", type:"mcq", q:"Who built the Taj Mahal?", options:["Emperor Shah Jahan","Emperor Akbar","Emperor Aurangzeb","Emperor Babur"], answer:0, explain:"Emperor Shah Jahan built the Taj Mahal in memory of his wife, Mumtaz Mahal.",
  learn:{ text:"Shah Jahan was the fifth Mughal emperor and is remembered as one of history's greatest patrons of architecture. Heartbroken after his wife Mumtaz Mahal died, he had thousands of skilled workers and craftsmen spend over 20 years building her tomb, the Taj Mahal.",
  links:[{label:"Wikipedia: Shah Jahan", url:"https://en.wikipedia.org/wiki/Shah_Jahan"}] } },
{ topic:"monuments", type:"picture", picture:"🕌", q:"This white marble monument was built by an emperor in memory of his wife. Name it.", options:["Taj Mahal","Red Fort","Qutub Minar","Golden Temple"], answer:0, explain:"The Taj Mahal was built by Shah Jahan in memory of Mumtaz Mahal.",
  learn:{ text:"The Taj Mahal appears to change colour throughout the day, glowing pink at sunrise, dazzling white at noon, and golden under moonlight. Its perfectly symmetrical design, framed by four minarets and reflecting pools, took an estimated 20,000 workers over two decades to complete.",
  links:[{label:"Wikipedia: Taj Mahal", url:"https://en.wikipedia.org/wiki/Taj_Mahal"}] } },
{ topic:"monuments", type:"picture", picture:"🌊🏛️", q:"This grand stone archway stands facing the sea and once welcomed royal visitors arriving by ship. Name it.", options:["Gateway of India","India Gate","Charminar","Hawa Mahal"], answer:0, explain:"The Gateway of India stands on the waterfront in Mumbai.",
  learn:{ text:"Standing 26 metres tall on Mumbai's waterfront, the Gateway of India blends Hindu and Muslim architectural styles. It faces the Arabian Sea and remains one of Mumbai's most visited landmarks, with boats to nearby Elephanta Island departing from right beside it.",
  links:[{label:"Wikipedia: Gateway of India", url:"https://en.wikipedia.org/wiki/Gateway_of_India"}] } },
{ topic:"monuments", type:"picture", picture:"🛕✨", q:"This shrine, covered in gold, is one of the holiest sites for Sikhs. Name it.", options:["Golden Temple","Konark Sun Temple","Hawa Mahal","Qutub Minar"], answer:0, explain:"The Golden Temple in Amritsar is covered in real gold.",
  learn:{ text:"The Golden Temple sits in the middle of a sacred pool called the Amrit Sarovar, meaning 'pool of nectar,' from which the city of Amritsar gets its name. Its gold-plated dome and walls were added in the early 1800s under Maharaja Ranjit Singh.",
  links:[{label:"Wikipedia: Golden Temple", url:"https://en.wikipedia.org/wiki/Golden_Temple"}] } },
{ topic:"monuments", type:"picture", picture:"🛞🛕", q:"This ancient temple is built to look like a giant stone chariot with carved wheels. Name it.", options:["Konark Sun Temple","Golden Temple","Red Fort","Charminar"], answer:0, explain:"The Konark Sun Temple in Odisha is shaped like a chariot with 24 carved wheels.",
  learn:{ text:"Each of the temple's 24 wheels is over 3 metres wide and decorated with detailed carvings, and together with seven stone horses, they represent the sun god's chariot racing across the sky. Sailors once used the temple's tall tower as a landmark, calling it the 'Black Pagoda.'",
  links:[{label:"Wikipedia: Konark Sun Temple", url:"https://en.wikipedia.org/wiki/Konark_Sun_Temple"}] } },
{ topic:"monuments", type:"picture", picture:"🏯🌸", q:"This pink, honeycomb-like palace has many small windows so royal ladies could watch the streets. Name it.", options:["Hawa Mahal","Taj Mahal","India Gate","Red Fort"], answer:0, explain:"Hawa Mahal in Jaipur has 953 small windows called jharokhas.",
  learn:{ text:"Hawa Mahal has five storeys but is remarkably thin, almost like a stage backdrop, since it was built without a foundation and leans on wooden supports. Its unique honeycomb shape is said to represent the crown of the Hindu god Krishna.",
  links:[{label:"Wikipedia: Hawa Mahal", url:"https://en.wikipedia.org/wiki/Hawa_Mahal"}] } },
{ topic:"monuments", type:"identify", q:"I am a tall stone tower in Delhi, one of the tallest brick minarets in the world. Who am I?", options:["Qutub Minar","India Gate","Charminar","Gateway of India"], answer:0, explain:"The Qutub Minar in Delhi is a famous tall minaret.",
  learn:{ text:"Construction of the Qutub Minar began around 1199 under ruler Qutb-ud-din Aibak and was completed by his successors over several decades. Standing 73 metres tall and made of red sandstone and marble, it's the tallest brick minaret in the world and a UNESCO World Heritage Site.",
  links:[{label:"Wikipedia: Qutb Minar", url:"https://en.wikipedia.org/wiki/Qutb_Minar"}] } },
{ topic:"monuments", type:"identify", q:"I am a war memorial arch in Delhi, built to honour soldiers who died in World War I. Who am I?", options:["India Gate","Red Fort","Qutub Minar","Charminar"], answer:0, explain:"India Gate honours soldiers who fought in World War I.",
  learn:{ text:"Designed by British architect Edwin Lutyens, India Gate resembles a triumphal arch and stands at the heart of New Delhi's ceremonial boulevard. Since 1972, it has also included the Amar Jawan Jyoti, a flame honouring unknown soldiers, though today the flame has been merged into the National War Memorial nearby.",
  links:[{label:"Wikipedia: India Gate", url:"https://en.wikipedia.org/wiki/India_Gate"}] } },
{ topic:"monuments", type:"identify", q:"I am an ancient group of caves in Maharashtra, famous for beautiful Buddhist paintings and sculptures carved into rock. Who am I?", options:["Ajanta Caves","Elephanta Caves","Konark Sun Temple","Hawa Mahal"], answer:0, explain:"The Ajanta Caves are famous for their ancient Buddhist rock-cut art.",
  learn:{ text:"The 30 caves at Ajanta were carved over several centuries, some as early as 200 BCE, by Buddhist monks as prayer halls and monasteries. Their wall paintings, depicting the life of the Buddha, are considered some of the finest surviving examples of ancient Indian art.",
  links:[{label:"Wikipedia: Ajanta Caves", url:"https://en.wikipedia.org/wiki/Ajanta_Caves"}] } },
{ topic:"monuments", type:"identify", q:"I am a red sandstone fort in Delhi where the Prime Minister hoists the flag every Independence Day. Who am I?", options:["Red Fort","Qutub Minar","India Gate","Golden Temple"], answer:0, explain:"The Red Fort is where the Prime Minister hoists the national flag on 15th August.",
  learn:{ text:"The Red Fort was the residence of Mughal emperors until 1857 and later became a symbolic site for India's freedom, since Subhas Chandra Bose promised to one day raise the flag there. That promise came true after independence, and it has been the site of the Prime Minister's Independence Day speech every year since 1947.",
  links:[{label:"Wikipedia: Red Fort", url:"https://en.wikipedia.org/wiki/Red_Fort"}] } },
{ topic:"monuments", type:"oddOneOut", q:"Which monument is NOT found in Delhi?", hint:"Three of these are in Delhi, and one is in a different city.", options:["Charminar","Red Fort","India Gate","Qutub Minar"], answer:0, explain:"Charminar is located in Hyderabad, not Delhi.",
  learn:{ text:"While Delhi is home to many Mughal-era monuments like the Red Fort and Qutub Minar, Charminar belongs to a different dynasty entirely: it was built by the Qutb Shahi rulers of the Deccan in Hyderabad, hundreds of kilometres to the south.",
  links:[{label:"Wikipedia: Charminar", url:"https://en.wikipedia.org/wiki/Charminar"}] } },

// ============================================================
// 3. NATIONAL SYMBOLS OF INDIA  (20)
// ============================================================
{ topic:"symbols", type:"picture", picture:"🦚", q:"This beautiful bird with colourful feathers is India's national bird. Name it.", options:["Peacock","Parrot","Sparrow","Crane"], answer:0, explain:"The peacock is India's national bird.",
  learn:{ text:"The Indian peacock, or peafowl, was declared India's national bird in 1963, chosen for its bright colours and importance in Indian art, mythology, and folklore. Only males have the famous long, colourful tail feathers, which they fan out to attract females during courtship.",
  links:[{label:"Wikipedia: Indian peafowl", url:"https://en.wikipedia.org/wiki/Indian_peafowl"}] } },
{ topic:"symbols", type:"picture", picture:"🐅", q:"This big striped cat is India's national animal. Name it.", options:["Tiger","Lion","Leopard","Cheetah"], answer:0, explain:"The Bengal Tiger is India's national animal.",
  learn:{ text:"The Bengal Tiger became India's national animal in 1973, the same year the government launched 'Project Tiger' to protect its shrinking population. Thanks to decades of conservation work across dozens of tiger reserves, India is now home to most of the world's wild tigers.",
  links:[{label:"Wikipedia: Bengal tiger", url:"https://en.wikipedia.org/wiki/Bengal_tiger"}] } },
{ topic:"symbols", type:"picture", picture:"🪷", q:"This flower grows in muddy water and is India's national flower. Name it.", options:["Lotus","Rose","Sunflower","Marigold"], answer:0, explain:"The Lotus is India's national flower.",
  learn:{ text:"The lotus is sacred in both Hindu and Buddhist traditions, admired for rising clean and beautiful out of muddy pond water, a symbol of purity and rebirth. Many Indian gods and goddesses, including Lakshmi and Brahma, are shown seated on a lotus.",
  links:[{label:"Wikipedia: Nelumbo nucifera", url:"https://en.wikipedia.org/wiki/Nelumbo_nucifera"}] } },
{ topic:"symbols", type:"picture", picture:"🥭", q:"This sweet, juicy fruit is India's national fruit. Name it.", options:["Mango","Banana","Papaya","Guava"], answer:0, explain:"The Mango is India's national fruit.",
  learn:{ text:"Often called the 'king of fruits,' the mango has been grown in India for over 4,000 years, and India remains the world's largest producer today. There are hundreds of mango varieties across the country, from Alphonso to Dasheri, each with its own flavour and season.",
  links:[{label:"Wikipedia: Mango", url:"https://en.wikipedia.org/wiki/Mango"}] } },
{ topic:"symbols", type:"picture", picture:"🌊🙏", q:"This holy river is considered India's national river. Name it.", options:["Ganga","Yamuna","Godavari","Narmada"], answer:0, explain:"The Ganga (Ganges) is India's national river.",
  learn:{ text:"The Ganga was declared India's 'National River' in 2008. Flowing over 2,500 km from the Himalayas to the Bay of Bengal, it supports hundreds of millions of people and is considered sacred in Hinduism, with cities like Varanasi built along its banks for pilgrimage.",
  links:[{label:"Wikipedia: Ganges", url:"https://en.wikipedia.org/wiki/Ganges"}] } },
{ topic:"symbols", type:"mcq", q:"What is shown on India's national emblem, and where does its design come from?", options:["Four lions, from the Lion Capital of Ashoka","A tiger, from a temple carving","An elephant, from a Mughal painting","A peacock, from a British medal"], answer:0, explain:"India's national emblem is adapted from the Lion Capital of Ashoka at Sarnath.",
  learn:{ text:"The original Lion Capital was carved in stone around the 3rd century BCE, placed atop a pillar by Emperor Ashoka at Sarnath, where the Buddha gave his first sermon. India adopted a version showing four lions as its official emblem in 1950, and its motto, engraved below, reads 'Satyameva Jayate,' meaning 'truth alone triumphs.'",
  links:[{label:"Wikipedia: Lion Capital of Ashoka", url:"https://en.wikipedia.org/wiki/Lion_Capital_of_Ashoka"}] } },
{ topic:"symbols", type:"mcq", q:"What is India's national tree?", options:["Banyan Tree","Mango Tree","Neem Tree","Peepal Tree"], answer:0, explain:"The Banyan Tree is India's national tree.",
  learn:{ text:"The banyan is known for its unusual aerial roots, which grow down from its branches and thicken into new trunks over time, letting a single tree spread across a huge area and live for centuries. This long life and vast, sheltering canopy made it a natural choice as a symbol of India's own unity and endurance.",
  links:[{label:"Wikipedia: Ficus benghalensis", url:"https://en.wikipedia.org/wiki/Ficus_benghalensis"}] } },
{ topic:"symbols", type:"mcq", q:"What is India's national anthem called?", options:["Jana Gana Mana","Vande Mataram","Sare Jahan Se Achha","Saare Jahaan"], answer:0, explain:"'Jana Gana Mana' is India's national anthem.",
  learn:{ text:"'Jana Gana Mana' was originally written in Bengali and was first sung in public in 1911. It was formally adopted as India's national anthem by the Constituent Assembly in 1950, and its full version takes about 52 seconds to sing.",
  links:[{label:"Wikipedia: Jana Gana Mana", url:"https://en.wikipedia.org/wiki/Jana_Gana_Mana"}] } },
{ topic:"symbols", type:"mcq", q:"What is India's national song called (different from the national anthem)?", options:["Vande Mataram","Jana Gana Mana","Ae Mere Watan","Mile Sur Mera Tumhara"], answer:0, explain:"'Vande Mataram' is India's national song.",
  learn:{ text:"'Vande Mataram,' meaning 'I bow to thee, Mother,' comes from a novel written in 1882 and became a rallying cry during India's freedom movement. It holds equal status with the national anthem but is used on different, less formal occasions.",
  links:[{label:"Wikipedia: Vande Mataram", url:"https://en.wikipedia.org/wiki/Vande_Mataram"}] } },
{ topic:"symbols", type:"mcq", q:"How many colours are there in the Indian national flag?", options:["Two","Three","Four","Five"], answer:1, explain:"The Indian flag has three colours: saffron, white and green.",
  learn:{ text:"India's tricolour flag, adopted in 1947, has saffron on top representing courage and sacrifice, white in the middle standing for peace and truth, and green at the bottom symbolising fertility and growth. In the centre sits the navy-blue Ashoka Chakra with 24 spokes.",
  links:REF.flag } },
{ topic:"symbols", type:"mcq", q:"What is India's national aquatic animal?", options:["Ganges River Dolphin","Whale Shark","Gharial","Sea Turtle"], answer:0, explain:"The Ganges River Dolphin is India's national aquatic animal.",
  learn:{ text:"The Ganges River Dolphin is nearly blind and instead uses echolocation, like a natural sonar, to find its way and hunt for fish in murky river water. It was declared India's national aquatic animal in 2010 and is now an endangered species, threatened by pollution and dams.",
  links:[{label:"Wikipedia: South Asian river dolphin", url:"https://en.wikipedia.org/wiki/South_Asian_river_dolphin"}] } },
{ topic:"symbols", type:"mcq", q:"Which game is traditionally regarded as India's national game?", options:["Hockey","Cricket","Kabaddi","Football"], answer:0, explain:"Hockey is traditionally regarded as India's national game.",
  learn:{ text:"Field hockey is often called India's national game because of the country's golden era in the sport, when the Indian men's team won eight Olympic gold medals between 1928 and 1980. However, the Indian government has clarified that no sport has ever been officially declared a 'national game.'",
  links:[{label:"Wikipedia: Hockey in India", url:"https://en.wikipedia.org/wiki/Hockey_in_India"}] } },
{ topic:"symbols", type:"identify", q:"I am a tall, leafy tree with roots that hang down from my branches, and I am India's national tree. Who am I?", options:["Banyan Tree","Mango Tree","Neem Tree","Peepal Tree"], answer:0, explain:"The Banyan Tree is India's national tree.",
  learn:{ text:"A single banyan tree in Kolkata's Botanical Garden is so wide, with so many secondary trunks, that it looks like an entire forest rather than one tree. Banyans are also considered sacred in Hindu tradition and are often found near temples and village meeting spots.",
  links:[{label:"Wikipedia: Ficus benghalensis", url:"https://en.wikipedia.org/wiki/Ficus_benghalensis"}] } },
{ topic:"symbols", type:"identify", q:"I wrote India's national anthem, 'Jana Gana Mana.' Who am I?", options:["Rabindranath Tagore","Bankim Chandra Chattopadhyay","Sarojini Naidu","Muhammad Iqbal"], answer:0, explain:"Rabindranath Tagore wrote 'Jana Gana Mana.'",
  learn:{ text:"Rabindranath Tagore was a poet, writer, and artist from Bengal who became the first non-European to win the Nobel Prize in Literature, in 1913. Besides India's anthem, he also wrote the words for Bangladesh's national anthem, making him one of very few people to write two countries' anthems.",
  links:[{label:"Wikipedia: Rabindranath Tagore", url:"https://en.wikipedia.org/wiki/Rabindranath_Tagore"}] } },
{ topic:"symbols", type:"identify", q:"I wrote India's national song, 'Vande Mataram.' Who am I?", options:["Bankim Chandra Chattopadhyay","Rabindranath Tagore","Subramania Bharati","Ravindra Jain"], answer:0, explain:"Bankim Chandra Chattopadhyay wrote 'Vande Mataram.'",
  learn:{ text:"Bankim Chandra Chattopadhyay was a novelist who included 'Vande Mataram' in his 1882 Bengali novel Anandamath. The song imagines the nation as a mother goddess, and it quickly became a powerful, emotional anthem for freedom fighters during the independence movement.",
  links:[{label:"Wikipedia: Bankim Chandra Chattopadhyay", url:"https://en.wikipedia.org/wiki/Bankim_Chandra_Chattopadhyay"}] } },
{ topic:"symbols", type:"identify", q:"I am the wheel with 24 spokes found at the centre of the Indian flag. Who am I?", options:["Ashoka Chakra","Dharma Chakra Yantra","Sudarshan Chakra","Kalachakra"], answer:0, explain:"The Ashoka Chakra, with 24 spokes, sits at the centre of the flag.",
  learn:{ text:"The Ashoka Chakra is based on a wheel carving found on Emperor Ashoka's pillar at Sarnath and represents the 'wheel of dharma,' or the eternal wheel of righteous law and constant progress. It replaced a spinning wheel (charkha) that had appeared on earlier versions of the flag used during the freedom movement.",
  links:REF.ashokaChakra } },
{ topic:"symbols", type:"identify", q:"I am the motto written below India's national emblem, meaning 'Truth alone triumphs.' Who am I?", options:["Satyameva Jayate","Vasudhaiva Kutumbakam","Jai Hind","Vande Mataram"], answer:0, explain:"'Satyameva Jayate' is the national motto of India.",
  learn:{ text:"This phrase comes from the ancient Mundaka Upanishad, a Hindu philosophical text written thousands of years ago. It was chosen as India's national motto and appears in Devanagari script directly beneath the four-lion national emblem on official government documents.",
  links:[{label:"Wikipedia: Satyameva Jayate", url:"https://en.wikipedia.org/wiki/Satyameva_Jayate"}] } },
{ topic:"symbols", type:"oddOneOut", q:"Which one of these is NOT a national symbol of India?", hint:"Three of these are official national symbols.", options:["Sunflower","Lotus","Peacock","Banyan Tree"], answer:0, explain:"The Sunflower is not a national symbol — the Lotus is our national flower.",
  learn:{ text:"While sunflowers are grown widely across India as an oilseed crop, they hold no official national status. The lotus, by contrast, was chosen as the national flower because of its deep roots in Indian religion, art, and philosophy.",
  links:[{label:"Wikipedia: Nelumbo nucifera", url:"https://en.wikipedia.org/wiki/Nelumbo_nucifera"}] } },
{ topic:"symbols", type:"oddOneOut", q:"Which one of these is NOT a national symbol of India?", hint:"Three of these are official national symbols.", options:["Cheetah","Tiger","Peacock","Lotus"], answer:0, explain:"The Cheetah is not a national symbol — the Tiger is India's national animal.",
  learn:{ text:"Cheetahs actually went extinct in India by 1952, and in 2022 a handful were reintroduced from Africa as part of a conservation project, but the species still holds no official symbolic status. The tiger remains India's national animal, chosen in 1973 alongside the launch of Project Tiger.",
  links:[{label:"Wikipedia: Bengal tiger", url:"https://en.wikipedia.org/wiki/Bengal_tiger"}] } },
{ topic:"symbols", type:"mcq", q:"What is the symbol for India's national currency, the Rupee?", options:["₹","$","£","¥"], answer:0, explain:"The ₹ symbol represents the Indian Rupee.",
  learn:{ text:"The ₹ symbol was designed by an Indian student, D. Udaya Kumar, who won a public competition held by the government. It combines the Devanagari letter 'र' with the Latin letter 'R,' and was officially adopted in 2010, making the Rupee one of the few currencies with its own unique symbol.",
  links:[{label:"Wikipedia: Indian rupee sign", url:"https://en.wikipedia.org/wiki/Indian_rupee_sign"}] } },

// ============================================================
// 4. NATIONAL FESTIVALS OF INDIA  (20)
// ============================================================
{ topic:"festivals", type:"mcq", q:"Which day do we celebrate as Independence Day?", options:["15th August","26th January","2nd October","14th November"], answer:0, explain:"India celebrates Independence Day on 15th August.",
  learn:{ text:"India became a free nation on 15th August 1947, when British rule finally ended after decades of struggle led by Mahatma Gandhi and many other freedom fighters. Jawaharlal Nehru, India's first Prime Minister, marked the occasion with his famous 'Tryst with Destiny' speech at midnight.",
  links:REF.independence } },
{ topic:"festivals", type:"mcq", q:"Republic Day is celebrated on which date?", options:["26th January","15th August","2nd October","5th September"], answer:0, explain:"Republic Day is celebrated on 26th January, when our Constitution came into effect.",
  learn:{ text:"India's Constitution was adopted by the Constituent Assembly on 26th November 1949 but came into force on 26th January 1950, turning India into a full republic. This date was specially chosen because the Indian National Congress had first declared 'Purna Swaraj' (complete independence) on 26th January 1930.",
  links:REF.republicDay } },
{ topic:"festivals", type:"mcq", q:"Gandhi Jayanti is celebrated on which date?", options:["2nd October","15th August","26th January","14th November"], answer:0, explain:"Gandhi Jayanti, Mahatma Gandhi's birthday, is on 2nd October.",
  learn:{ text:"Mahatma Gandhi was born on 2nd October 1869, and this day is observed across India as a national holiday in his honour. Since 2007, the United Nations has also marked 2nd October as the International Day of Non-Violence, recognising Gandhi's global influence.",
  links:REF.gandhiJayanti } },
{ topic:"festivals", type:"mcq", q:"On Independence Day, from which country did India gain freedom?", options:["Britain","France","Portugal","Netherlands"], answer:0, explain:"India gained independence from British rule on 15th August 1947.",

/* =====================================================
   STATE
===================================================== */
let order = [];
let current = 0;
let score = 0;
let answered = false;
let topicsCovered = new Set();
let perTopicScore = {};
let timerDuration = 20;   // seconds, 0 = no limit
let timeLeft = 0;
let timerInterval = null;
const RING_R = 18;
const RING_CIRC = 2 * Math.PI * RING_R;

function shuffle(arr){
  const a = [...arr];
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

const panel = document.getElementById('panel');
const stampRail = document.getElementById('stampRail');
const footNote = document.getElementById('footNote');

function renderStamps(){
  stampRail.innerHTML = TOPICS.map(t=>{
    const done = topicsCovered.has(t.key) ? 'done' : '';
    return `<div class="stamp ${done}" title="${t.name}">${t.icon}</div>`;
  }).join('');
}

/* =====================================================
   START SCREEN
===================================================== */
const TIMER_CHOICES = [10, 15, 20, 30, 0]; // 0 = no limit

function renderStart(){
  renderStamps();
  footNote.textContent = `🇮🇳 5 topics · ${QUESTIONS.length} questions · Good luck, explorer!`;
  panel.innerHTML = `
    <div class="start-screen">
      <div class="big-emblem">🇮🇳</div>
      <h2>Welcome, Explorer!</h2>
      <p class="sub">Get your passport stamped by answering questions about India's states, monuments, symbols, festivals and leaders. Read carefully, watch the clock, and pick your best answer! After each answer, you can tap "Want to learn more?" for a short story and links to read further.</p>
      <div class="topic-grid">
        ${TOPICS.map(t=>`<div class="topic-chip"><span class="ti">${t.icon}</span><span class="tn">${t.name}</span><span class="tc">${QUESTIONS.filter(q=>q.topic===t.key).length} questions</span></div>`).join('')}
      </div>
      <div class="timer-picker">
        <div class="tp-label">⏱️ Seconds per question</div>
        <div class="timer-options" id="timerOptions">
          ${TIMER_CHOICES.map(s=>`<button type="button" class="timer-opt ${s===timerDuration?'selected':''}" data-s="${s}">${s===0?'No limit':s+'s'}</button>`).join('')}
        </div>
      </div>
      <button class="primary-btn" id="startBtn">Start My Journey ✈️</button>
    </div>
  `;
  document.querySelectorAll('.timer-opt').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      timerDuration = parseInt(btn.dataset.s);
      document.querySelectorAll('.timer-opt').forEach(b=>b.classList.remove('selected'));
      btn.classList.add('selected');
    });
  });
  document.getElementById('startBtn').addEventListener('click', startQuiz);
}

function startQuiz(){
  order = shuffle(QUESTIONS.map((_,i)=>i));
  current = 0;
  score = 0;
  answered = false;
  topicsCovered = new Set();
  perTopicScore = {};
  TOPICS.forEach(t=> perTopicScore[t.key] = {correct:0,total:0,timedOut:0});
  renderQuestion();
}

/* =====================================================
   TIMER
===================================================== */
function stopTimer(){
  if(timerInterval){ clearInterval(timerInterval); timerInterval = null; }
}

function startTimer(){
  stopTimer();
  if(timerDuration <= 0) return; // no limit mode
  timeLeft = timerDuration;
  updateTimerUI();
  timerInterval = setInterval(()=>{
    timeLeft--;
    updateTimerUI();
    if(timeLeft <= 0){
      stopTimer();
      handleTimeout();
    }
  }, 1000);
}

function updateTimerUI(){
  const numEl = document.getElementById('timerNum');
  const ringEl = document.getElementById('timerRingFg');
  const rowEl = document.getElementById('timerRow');
  if(!numEl) return;
  numEl.textContent = timeLeft;
  const frac = Math.max(0, timeLeft / timerDuration);
  const offset = RING_CIRC * (1 - frac);
  ringEl.style.strokeDashoffset = offset;
  if(rowEl){
    if(timeLeft <= Math.ceil(timerDuration*0.25)) rowEl.classList.add('urgent');
    else rowEl.classList.remove('urgent');
  }
}

/* =====================================================
   QUESTION SCREEN
===================================================== */
function renderQuestion(){
  answered = false;
  const qi = order[current];
  const q = QUESTIONS[qi];
  const topic = TOPICS.find(t=>t.key===q.topic);
  renderStamps();

  const progressPct = Math.round((current / order.length) * 100);

  panel.innerHTML = `
    <div class="quiz-meta">
      <span class="topic-tag">${topic.icon} ${topic.name}</span>
      <span class="qcount">Question ${current+1} of ${order.length}</span>
    </div>
    <div class="progress-track"><div class="progress-fill" style="width:${progressPct}%"></div></div>

    ${timerDuration > 0 ? `
    <div class="timer-row" id="timerRow">
      <div class="timer-ring-wrap">
        <svg width="44" height="44" viewBox="0 0 44 44">
          <circle class="timer-ring-bg" cx="22" cy="22" r="${RING_R}"></circle>
          <circle class="timer-ring-fg" id="timerRingFg" cx="22" cy="22" r="${RING_R}"
            stroke-dasharray="${RING_CIRC}" stroke-dashoffset="0"></circle>
        </svg>
        <div class="timer-ring-num" id="timerNum">${timerDuration}</div>
      </div>
      <span class="timer-label">Answer before time runs out!</span>
    </div>` : ``}

    <span class="qtype-badge">${TYPE_LABEL[q.type]}</span>
    <p class="question-text">${q.q}</p>
    ${q.hint ? `<p class="question-hint">${q.hint}</p>` : ``}
    ${q.type==='picture' ? `<div class="picture-stage" aria-hidden="true">${q.picture}</div>` : ``}

    <div class="options" id="optionsWrap">
      ${q.options.map((opt,i)=>`
        <button class="option" data-i="${i}">
          <span class="letter">${String.fromCharCode(65+i)}</span>
          <span>${opt}</span>
        </button>
      `).join('')}
    </div>

    <div class="feedback" id="feedbackBox"></div>

    <div class="learnmore-wrap" id="learnWrap">
      <button class="learn-toggle" id="learnToggle">📖 Want to learn more?</button>
      <div class="learn-panel" id="learnPanel">
        <p>${q.learn ? q.learn.text : ''}</p>
        <div class="ref-links">
          ${q.learn ? q.learn.links.map(l=>`<a href="${l.url}" target="_blank" rel="noopener">🔗 ${l.label}</a>`).join('') : ''}
        </div>
      </div>
    </div>

    <div class="nav-row">
      <button class="primary-btn" id="nextBtn" style="display:none;">
        ${current === order.length-1 ? 'See My Results 🏁' : 'Next Question →'}
      </button>
    </div>
  `;

  document.querySelectorAll('.option').forEach(btn=>{
    btn.addEventListener('click', ()=>handleAnswer(parseInt(btn.dataset.i), q, topic));
  });

  startTimer();
}

function lockOptions(q, choice){
  const opts = document.querySelectorAll('.option');
  opts.forEach((btn,i)=>{
    btn.classList.add('locked');
    if(i === q.answer) btn.classList.add('correct');
    else if(choice !== null && i === choice) btn.classList.add('wrong');
    else btn.classList.add('dim');
  });
}

function showLearnMore(){
  const wrap = document.getElementById('learnWrap');
  wrap.classList.add('show');
  document.getElementById('learnToggle').addEventListener('click', ()=>{
    document.getElementById('learnPanel').classList.toggle('open');
  });
}

function goNext(){
  document.getElementById('nextBtn').addEventListener('click', ()=>{
    current++;
    if(current < order.length) renderQuestion();
    else renderResults();
  });
}

function handleAnswer(choice, q, topic){
  if(answered) return;
  answered = true;
  stopTimer();
  topicsCovered.add(q.topic);
  perTopicScore[q.topic].total++;

  const isCorrect = choice === q.answer;
  if(isCorrect){
    score++;
    perTopicScore[q.topic].correct++;
  }

  lockOptions(q, choice);

  const fb = document.getElementById('feedbackBox');
  fb.classList.add('show', isCorrect ? 'good' : 'bad');
  fb.innerHTML = `
    <span class="fi">${isCorrect ? '🎉' : '📘'}</span>
    <span>${isCorrect ? 'Correct! ' : 'Not quite. '}${q.explain}</span>
  `;

  showLearnMore();
  document.getElementById('nextBtn').style.display = 'inline-block';
  goNext();
}

function handleTimeout(){
  if(answered) return;
  answered = true;
  const qi = order[current];
  const q = QUESTIONS[qi];
  const topic = TOPICS.find(t=>t.key===q.topic);
  topicsCovered.add(q.topic);
  perTopicScore[q.topic].total++;
  perTopicScore[q.topic].timedOut++;

  lockOptions(q, null);

  const fb = document.getElementById('feedbackBox');
  fb.classList.add('show', 'bad');
  fb.innerHTML = `
    <span class="fi">⏰</span>
    <span>Time's up! ${q.explain}</span>
  `;

  showLearnMore();
  document.getElementById('nextBtn').style.display = 'inline-block';
  goNext();
}

/* =====================================================
   RESULTS SCREEN
===================================================== */
function getRank(pct){
  if(pct === 100) return {medal:"🏆", label:"India Explorer Champion!"};
  if(pct >= 80) return {medal:"🥇", label:"Gold Passport Holder!"};
  if(pct >= 60) return {medal:"🥈", label:"Silver Passport Holder!"};
  if(pct >= 40) return {medal:"🥉", label:"Bronze Passport Holder!"};
  return {medal:"🌱", label:"Keep Exploring, Young Traveller!"};
}

function renderResults(){
  renderStamps();
  const total = order.length;
  const pct = Math.round((score/total)*100);
  const rank = getRank(pct);

  panel.innerHTML = `
    <div class="results-screen">
      <div class="medal">${rank.medal}</div>
      <h2>Journey Complete!</h2>
      <div class="score-big">${score} / ${total}</div>
      <div class="score-sub">${pct}% correct</div>
      <div class="rank-line">${rank.label}</div>

      <div class="topic-breakdown">
        ${TOPICS.map(t=>{
          const s = perTopicScore[t.key] || {correct:0,total:0,timedOut:0};
          return `<div class="tb-card">
            <div class="tb-name">${t.icon} ${t.name}</div>
            <div class="tb-score">${s.correct}/${s.total}</div>
            ${s.timedOut>0 ? `<div class="tb-timedout">⏰ ${s.timedOut} timed out</div>` : ``}
          </div>`;
        }).join('')}
      </div>

      <div class="btn-row">
        <button class="primary-btn" id="retryBtn">Play Again 🔁</button>
      </div>
    </div>
  `;
  document.getElementById('retryBtn').addEventListener('click', renderStart);
}

/* =====================================================
   INIT
===================================================== */
renderStart();
</script>
</body>
</html>
